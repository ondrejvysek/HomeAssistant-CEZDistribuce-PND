type: custom:apexcharts-card
stacked: true
graph_span: 1y
span:
  end: month
header:
  show: true
  title: PND Historická Data (Měsíční agregace)
series:
  - entity: sensor.pnd_data
    name: Výroba
    attribute: production
    data_generator: |
      return entity.attributes.pnddate.map((pnd, index) => {
        const date = new Date(pnd);
        date.setDate(2);
        date.setHours(0, 0, 0, 0);      
        return [date.getTime(), parseFloat(entity.attributes.production[index])];
      });
    color: var(--success-color)
    opacity: 0.8
    invert: false
    type: column
    group_by:
      func: sum
      duration: 1month
  - entity: sensor.pnd_data
    name: Spotřeba
    attribute: consumption
    data_generator: |
      return entity.attributes.pnddate.map((pnd, index) => {
        const date = new Date(pnd);
        date.setDate(2);
        date.setHours(0, 0, 0, 0);
        return [date.getTime(), parseFloat(entity.attributes.consumption[index])];
      });
    color: var(--error-color)
    opacity: 0.8
    invert: true
    type: column
    group_by:
      func: sum
      duration: 1month
apex_config:
  tooltip:
    x:
      formatter: |
        EVAL: (value) => {
          const date = new Date(value);
          date.setDate(date.getDate() + 5);
          const formatter = new Intl.DateTimeFormat(navigator.language, { year: 'numeric', month: 'long' });
          return formatter.format(date);          
        }
